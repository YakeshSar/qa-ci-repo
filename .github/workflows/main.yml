# .github/workflows/ci.yml
name: Java CI/CT Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci-tests:
    name: CI - Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Unit Tests
        run: mvn clean test

      - name: Run Integration Tests
        run: mvn clean test

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ci-test-report
          path: target/surefire-reports/

  ct-tests:
    name: CT - E2E & Regression Tests
    runs-on: ubuntu-latest
    needs: ci-tests          # Runs only if CI passes

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run E2E / Regression Tests
        run: mvn clean test

      - name: Upload CT Test Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ct-test-report
          path: target/surefire-reports/
