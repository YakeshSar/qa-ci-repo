name: Java CI/CT Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci-tests:
    name: CI - Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4                   # ✅ v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4                 # ✅ v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4                      # ✅ v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Unit Tests
        run: mvn test -v

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4            # ✅ v4
        if: always()
        with:
          name: ci-test-report
          path: target/surefire-reports/

  ct-tests:
    name: CT - E2E & Regression Tests
    runs-on: ubuntu-latest
    needs: ci-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4                   # ✅ v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4                 # ✅ v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4                      # ✅ v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Install Chrome Browser
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium / TestNG Tests
        run: mvn test -Dsurefire.suiteXmlFiles=testng.xml
        env:
          HEADLESS: true
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload CT Test Report
        uses: actions/upload-artifact@v4            # ✅ v4
        if: always()
        with:
          name: ct-test-report
          path: target/surefire-reports/
